<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Logo Capture</title>
  <style>
    :root {
      --bg: #eef2ff;
      --text: #0f213d;
      --dot-shadow: rgba(59, 130, 246, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(180deg, #f2f5ff 0%, var(--bg) 100%);
      font-family: Inter, "Arial Black", Arial, sans-serif;
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: clamp(24px, 3vw, 48px);
      padding: 32px;
    }

    .brand-mark {
      width: clamp(134px, 15vw, 196px);
      height: clamp(134px, 15vw, 196px);
      border-radius: 999px;
      background: linear-gradient(135deg, #1e40af, #3b82f6, #dbeafe);
      box-shadow: 0 0 86px var(--dot-shadow);
      flex: 0 0 auto;
    }

    .brand-text {
      color: var(--text);
      font-size: clamp(72px, 12vw, 192px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .logo-lockup {
        flex-direction: column;
        text-align: center;
      }

      .brand-text {
        font-size: clamp(52px, 14vw, 110px);
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="logo-lockup" aria-label="Blueprint logo">
    <div class="brand-mark" aria-hidden="true"></div>
    <div class="brand-text">BLUEPRINT</div>
  </div>
</body>
</html>
